<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Battleship: The greatest game to have ever been made!</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close" />
</head>
<body>
	<h1 class="message" id="message">It's Player 1's Turn!</h1>
	<div class="winner-message" id="winner-message"></div> 
	<div class="error-message" id="error-message"></div> 
	<header>
		<div class="player-card" id="player1-card">
			<div class="player-name" id="player1-name">Name: Player 1</div>
		</div>
		<div class="player-card" id="player2-card">
			<div class="player-name" id="player2-name">Name: Player 2</div>
		</div>
	</header>
	<div class="playing-area">
		<div class="gameboard" id="player1-gameboard"></div>
		<div class="separator"></div>
		<div class="gameboard" id="player2-gameboard"></div>
	</div>
	<div class="selections" id="ship-selection">
		<div class="ships">abc</div>
		<button class="confirm-placement btn" id="confirm-placement-btn">Confirm</button>
		<div class="ships"></div>
	</div>
	<div class="new-game-btn-container">
		<button class="new-game btn" id="new-game" hidden>New Game</button>
	</div>
</body>
</html>
